<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>whackamole</title>
  <style>
    html, body { margin:0; height:100%; background:#f4f4f4; font-family:system-ui, Arial; }
    .wrap { display:flex; flex-direction:column; align-items:center; gap:10px; padding:14px; }

    /* HUD */
    .hud { display:flex; gap:16px; align-items:center; }
    .pill { background:#fff; border:1px solid #ccc; padding:6px 10px; border-radius:8px; }

    /* Circle game area */
    #game {
      position:relative;
      width:600px; height:600px;
      border-radius:50%;
      background:#ffffff;
      border:2px solid #999;
      overflow:hidden;           /* clip to circle */
      touch-action:none;
      user-select:none;
    }

    /* Centered castle (red square) */
    #castle {
      position:absolute;
      width:40px; height:40px;
      background:#d62828;        /* red */
      left:50%; top:50%;
      transform:translate(-50%,-50%);
    }

    /* Enemies are triangles via clip-path */
    .enemy {
      position:absolute;
      width:28px; height:28px;
      clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
      cursor:pointer;
    }
    .enemy.sword { background:#d62828; }  /* red */
    .enemy.bow   { background:#2a9d8f; }  /* green */
    .enemy.wiz   { background:#277da1; }  /* blue */

    /* Projectiles */
    .arrow {
      position:absolute;
      width:14px; height:3px;
      background:#444;           /* neutral arrow color */
    }

    /* Wizard zigzag "beam" segments (small blue squares) */
    .beam-seg {
      position:absolute;
      width:6px; height:6px;
      background:#277da1;        /* blue to match wizard */
    }

    /* Overlay for Game Over */
    #overlay {
      position:absolute; inset:0;
      display:none; place-items:center;
      background:#00000080; color:#fff;
      text-align:center;
    }
    #overlay .card {
      background:#222; border:1px solid #444; padding:16px 20px; border-radius:10px;
    }
    #overlay h2 { margin:0 0 8px 0; font-size:20px; }
    #overlay p { margin:6px 0 12px 0; }
    button { padding:8px 12px; border:1px solid #aaa; background:#fff; border-radius:6px; cursor:pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <div class="pill">Lives: <span id="lives">3</span></div>
      <div class="pill">Enemies defeated: <span id="kills">0</span></div>
    </div>

    <div id="game" aria-label="Circular Game Area">
      <div id="castle" aria-label="Castle"></div>

      <div id="overlay">
        <div class="card">
          <h2>Game Over</h2>
          <p>You ran out of lives.</p>
          <button id="restart">Restart</button>
        </div>
      </div>
    </div>

    <div class="pill">Click enemies to defeat them. Sword (red) runs to castle. Bow (green) shoots straight. Wizard (blue) shoots zigzag.</div>
  </div>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script>
  // Circle Defense — minimal, clear comments

  $(function () {
    // ----- DOM handles -----
    const $game = $('#game');
    const $lives = $('#lives');
    const $kills = $('#kills');
    const $overlay = $('#overlay');
    const $restart = $('#restart');

    // ----- Geometry / arena -----
    const G_W = $game.width();
    const G_H = $game.height();
    const CX = G_W / 2;                    // arena center X
    const CY = G_H / 2;                    // arena center Y
    const RADIUS = G_W / 2;                // circular arena radius (game is square)
    const CASTLE_SIZE = 40;
    const CASTLE = {                       // castle is an AABB at the center
      x: CX - CASTLE_SIZE / 2,
      y: CY - CASTLE_SIZE / 2,
      w: CASTLE_SIZE,
      h: CASTLE_SIZE
    };

    // ----- Tuning -----
    const ENEMY_SIZE = 28;
    const MIN_SPAWN_RADIUS = 140;          // enemies spawn at least this far from the center
    const SPAWN_INTERVAL_MS = 900;
    const SWORD_SPEED = 80;                // “sword” enemies move toward the castle
    const BOW_COOLDOWN = 1600;             // “bow” enemies fire straight arrows on cooldown
    const WIZ_COOLDOWN = 2000;             // “wiz” enemies fire zig-zag beams on cooldown
    const ARROW_SPEED = 220;
    const BEAM_SPEED = 200;
    const ZIG_STEP = 20;                   // zig-zag flip distance along path
    const ZIG_AMPLITUDE = 16;              // zig-zag perpendicular offset

    // ----- Game state -----
    let running = true;
    let lives = 10;
    let kills = 0;

    let enemies = [];  // { $el, type, x,y,w,h, vx,vy, lastShot }
    let arrows = [];   // { $el, x,y,w,h, vx,vy }
    let beams = [];    // { origin:{x,y}, dir:{x,y}, perp:{x,y}, segs:[{ $el,x,y }], headDist, totalDist }

    let lastSpawn = performance.now();
    let lastTime = performance.now();

    // ----- Utilities -----
    const rand = (min, max) => Math.random() * (max - min) + min;

    function insideCircle(x, y) {
      const dx = x - CX, dy = y - CY;
      return dx * dx + dy * dy <= (RADIUS - 2) * (RADIUS - 2);
    }

    function spawnPos() {
      // Uniform angle; radius clamped so enemies spawn inside arena but not too close to center
      const r = rand(MIN_SPAWN_RADIUS, RADIUS - ENEMY_SIZE);
      const theta = rand(0, Math.PI * 2);
      const xCenter = CX + r * Math.cos(theta);
      const yCenter = CY + r * Math.sin(theta);
      return {
        x: Math.round(xCenter - ENEMY_SIZE / 2),
        y: Math.round(yCenter - ENEMY_SIZE / 2)
      };
    }

    function norm(x, y) {
      const m = Math.hypot(x, y) || 1;
      return { x: x / m, y: y / m };
    }

    function aabbOverlap(a, b) {
      return !(
        a.x + a.w < b.x ||
        a.x > b.x + b.w ||
        a.y + a.h < b.y ||
        a.y > b.y + b.h
      );
    }

    function clampToCircle(obj) {
      // Keeps an AABB centered within the circular arena
      const cx = obj.x + obj.w / 2, cy = obj.y + obj.h / 2;
      const dx = cx - CX, dy = cy - CY;
      const dist = Math.hypot(dx, dy);
      const maxDist = RADIUS - Math.max(obj.w, obj.h) / 2 - 1;
      if (dist > maxDist) {
        const k = maxDist / dist;
        const nx = CX + dx * k, ny = CY + dy * k;
        obj.x = Math.round(nx - obj.w / 2);
        obj.y = Math.round(ny - obj.h / 2);
      }
    }

    // ----- Spawning -----
    function spawnEnemy() {
      const r = Math.random();
      const type = r < 1 / 3 ? 'sword' : (r < 2 / 3 ? 'bow' : 'wiz');
      const pos = spawnPos();

      const $el = $('<div class="enemy"/>').addClass(type).appendTo($game);
      $el.css({ left: pos.x + 'px', top: pos.y + 'px' });

      const e = {
        $el, type,
        x: pos.x, y: pos.y, w: ENEMY_SIZE, h: ENEMY_SIZE,
      
      
      }}})

</script>

</body>
</html>
